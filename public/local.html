<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BINGO TAVAREZ</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#0a0510;color:#fff;font-family:'Cinzel',serif;min-height:100vh;overflow-x:hidden}

#top-bar{display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:#0d0528;border-bottom:2px solid #d4a93a44;flex-shrink:0}
#top-bar h1{font-family:'Cinzel Decorative',serif;font-size:22px;
  background:linear-gradient(180deg,#fff8e0,#ffd700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:3px}
#top-right{display:flex;align-items:center;gap:12px}
#local-badge{font-family:'Cinzel Decorative',serif;font-size:14px;color:#ffd700;
  background:linear-gradient(135deg,#1a0840,#2d1060);border:2px solid #d4a93a;
  border-radius:10px;padding:4px 14px;letter-spacing:2px}
#conn-indicator{width:10px;height:10px;border-radius:50%;background:#ff4444;transition:background .3s}
#conn-indicator.ok{background:#44ff88}
#last-num{display:flex;align-items:center;gap:8px;
  background:#0a0220;border:2px solid #d4a93a55;border-radius:10px;padding:6px 14px}
#last-label{font-size:10px;color:#888;letter-spacing:2px}
#last-value{font-family:'Cinzel Decorative',serif;font-size:24px;font-weight:900;
  color:#ffd700;min-width:60px;text-align:center;text-shadow:0 0 14px #ffd70066}

#main{flex:1;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
#subtitle{font-size:11px;color:#d4a93a88;letter-spacing:4px;text-align:center;text-transform:uppercase}
#status-msg{font-size:13px;color:#888;text-align:center;font-style:italic;letter-spacing:1px;min-height:20px}

/* Cards grid */
#cards-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;flex:1}

/* Bingo card */
.bingo-card{background:linear-gradient(160deg,#ffffff,#f0f4ff);border:2px solid #aabbdd;
  border-radius:12px;padding:7px 6px 8px;display:flex;flex-direction:column;gap:3px;
  box-shadow:0 2px 10px rgba(0,0,80,.12)}
.card-name-wrap{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.card-num-badge{flex-shrink:0;background:linear-gradient(135deg,#1a3a8a,#0a1e5e);color:#fff;
  font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:900;
  width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  border:2px solid #4466cc;box-shadow:0 0 5px rgba(50,100,200,.3)}
.card-name-wrap input{width:100%;background:#f8faff;border:1.5px solid #aabbddaa;border-radius:7px;
  color:#1a2a5a;font-family:'Cinzel',serif;font-size:11px;font-weight:700;
  padding:4px 7px;outline:none;text-align:center;letter-spacing:1px}
.card-name-wrap input:focus{border-color:#4488ff}
.card-name-wrap input::placeholder{color:#99aacc;font-size:10px}
.card-header{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-bottom:1px}
.card-header span{text-align:center;font-size:11px;font-weight:900;padding:2px 0;
  border-radius:4px;font-family:'Cinzel Decorative',serif}
.ltr-B{color:#dd1144;background:#ff446622}.ltr-I{color:#cc8800;background:#ffaa0022}
.ltr-N{color:#0099bb;background:#44ddff22}.ltr-G{color:#00aa44;background:#44ff8822}
.ltr-O{color:#9900cc;background:#dd44ff22}
.card-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;
  font-size:15px;font-weight:800;background:#eef2ff;border:1.5px solid #c0cce8;
  color:#1a2a5a;position:relative;user-select:none}
.cell.free{background:radial-gradient(circle,#3377ff,#0a44cc);color:#fff;
  font-size:7px;font-weight:900;border-color:#5599ff;box-shadow:0 0 8px rgba(50,120,255,.5)}
.cell.marked{background:radial-gradient(circle,#cc1a00,#8b0000)!important;color:#ffd700!important;
  border-color:#ff4400!important;box-shadow:0 0 10px rgba(255,60,0,.7)!important;
  transform:scale(.94);font-weight:900;font-size:16px!important}
.cell.marked.free{background:radial-gradient(circle,#2266ff,#0a3399)!important;
  color:#fff!important;border-color:#4488ff!important}
.cell.win-line{background:radial-gradient(circle,#00ffcc,#00aa88)!important;color:#000!important;
  border-color:#00ffcc!important;box-shadow:0 0 16px rgba(0,255,200,.9)!important;
  font-weight:900!important;animation:lineGlow 1s ease-in-out infinite alternate!important}
.cell.win-full{background:radial-gradient(circle,#ffd700,#cc8800)!important;color:#000!important;
  border-color:#ffd700!important;box-shadow:0 0 14px rgba(255,215,0,.95)!important;
  font-weight:900!important;animation:fullGlow .8s ease-in-out infinite alternate!important}
@keyframes lineGlow{from{box-shadow:0 0 8px rgba(0,255,200,.7)}to{box-shadow:0 0 24px rgba(0,255,200,1),0 0 6px #fff}}
@keyframes fullGlow{from{box-shadow:0 0 8px rgba(255,215,0,.7)}to{box-shadow:0 0 24px rgba(255,215,0,1),0 0 6px #fff8}}
.bingo-card.winner{animation:winFlash .5s ease-in-out 4;border-color:#ffd700;box-shadow:0 0 30px rgba(255,215,0,.8)}
@keyframes winFlash{0%,100%{background:linear-gradient(160deg,#fff,#f0f4ff)}50%{background:linear-gradient(160deg,#fff8d0,#ffeea0)}}

/* Waiting screen */
#waiting{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;gap:20px;text-align:center}
#waiting h2{font-family:'Cinzel Decorative',serif;font-size:28px;color:#ffd700;
  text-shadow:0 0 20px #ffd70066;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
#waiting p{color:#888;font-size:14px;letter-spacing:2px}

/* Winner overlay */
#winner-ov{position:fixed;inset:0;background:#000d;display:flex;align-items:center;justify-content:center;
  z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s}
#winner-ov.show{opacity:1;pointer-events:all}
#winner-box{background:radial-gradient(circle at 40% 30%,#2d1060,#0a0510);border:5px solid #ffd700;
  border-radius:28px;padding:50px 80px;text-align:center;
  transform:scale(.5);transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
  font-family:'Cinzel Decorative',serif;box-shadow:0 0 80px rgba(255,215,0,.4);max-width:700px}
#winner-ov.show #winner-box{transform:scale(1)}
#w-icon{font-size:70px;margin-bottom:10px}
#w-title{font-size:28px;color:#d4a93a;margin-bottom:6px}
#w-name{font-size:36px;color:#ffd700;margin-bottom:10px;text-shadow:0 0 20px #ffd70099}
#w-prize{font-size:90px;font-weight:900;color:#ffd700;line-height:1;text-shadow:0 0 30px #ffd70099}
#w-sub{font-size:18px;color:#aaa;margin-top:10px}
#w-close{margin-top:24px;padding:14px 48px;font-family:'Cinzel',serif;font-size:17px;font-weight:700;
  background:linear-gradient(135deg,#d4a93a,#ffd700);color:#0a0510;border:none;border-radius:12px;cursor:pointer}
#fwc{position:fixed;inset:0;pointer-events:none;z-index:999}
</style>
</head>
<body>
<canvas id="fwc"></canvas>

<div id="top-bar">
  <h1>✦ BINGO TAVAREZ ✦</h1>
  <div id="top-right">
    <div id="last-num">
      <span id="last-label">ÚLTIMO</span>
      <span id="last-value">—</span>
    </div>
    <div id="local-badge">LOCAL <span id="local-num">?</span></div>
    <div id="conn-indicator"></div>
  </div>
</div>

<div id="main">
  <div id="subtitle">by Lotronica</div>
  <div id="status-msg">⏳ Esperando conexión...</div>

  <div id="waiting">
    <h2>⏳ Esperando Nueva Partida</h2>
    <p>El host iniciará el juego en breve</p>
  </div>

  <div id="cards-grid" style="display:none"></div>
</div>

<div id="winner-ov">
  <div id="winner-box">
    <div id="w-icon">🏆</div>
    <div id="w-title">¡PREMIO!</div>
    <div id="w-name"></div>
    <div id="w-prize"></div>
    <div id="w-sub"></div>
    <button id="w-close" onclick="closeWinner()">Continuar</button>
  </div>
</div>

<script>
// Get local ID from URL: /local/3 → localId = 3
const pathParts = window.location.pathname.split('/');
const LOCAL_ID = parseInt(pathParts[pathParts.length - 1]) || 1;
document.getElementById('local-num').textContent = LOCAL_ID;

const PRIZES_INFO = {
  L:       {icon:'🏅',color:'#ffbb00',msg:'¡FIGURA L!',     prize:'$15'},
  T:       {icon:'🏅',color:'#ee88ff',msg:'¡FIGURA T!',     prize:'$15'},
  X:       {icon:'🏅',color:'#ff88aa',msg:'¡FIGURA X!',     prize:'$15'},
  CRUZ:    {icon:'✝️', color:'#88ffff',msg:'¡LA CRUZ!',      prize:'$15'},
  line:    {icon:'🏆',color:'#00ffcc',msg:'¡BINGO!',         prize:'$50'},
  fullCard:{icon:'🌟',color:'#ffd700',msg:'¡CARTÓN LLENO!', prize:'$100'},
};

const PATTERNS = {
  L:    [[0,0],[1,0],[2,0],[3,0],[4,0],[4,1],[4,2],[4,3],[4,4]],
  T:    [[0,0],[0,1],[0,2],[0,3],[0,4],[1,2],[2,2],[3,2],[4,2]],
  X:    [[1,1],[1,3],[3,1],[3,3]],
  CRUZ: [[1,2],[2,1],[2,3],[3,2]],
};

let cardsData = [];
let drawnNums = new Set();
let prizes = { L:false,T:false,X:false,CRUZ:false,line:false,fullCard:false };
const highlightedLines = new Set();

// ── WEBSOCKET ──────────────────────────────────────────────────────
const wsUrl = location.protocol === 'https:'
  ? `wss://${location.host}`
  : `ws://${location.host}`;
let ws;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join_local', localId: LOCAL_ID }));
    document.getElementById('conn-indicator').classList.add('ok');
    setStatus('Conectado ✓');
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'state':
        if (msg.cards && msg.cards.length) {
          loadCards(msg.cards);
          msg.state.drawnNumbers.forEach(n => markNumberOnCards(n, false));
          prizes = {...msg.state.prizes};
          updateLastNum(msg.state.drawnNumbers[msg.state.drawnNumbers.length - 1]);
        }
        break;
      case 'new_game':
        loadCards(msg.cards);
        drawnNums = new Set();
        prizes = {L:false,T:false,X:false,CRUZ:false,line:false,fullCard:false};
        highlightedLines.clear();
        updateLastNum(null);
        setStatus('¡Nueva partida iniciada! 🎉');
        break;
      case 'draw':
        drawnNums.add(msg.n);
        updateLastNum(msg.n);
        markNumberOnCards(msg.n, true);
        break;
      case 'prize_won':
        prizes[msg.prize] = true;
        showWinner(msg);
        break;
      case 'reset':
        loadCards(msg.cards);
        drawnNums = new Set();
        prizes = {L:false,T:false,X:false,CRUZ:false,line:false,fullCard:false};
        highlightedLines.clear();
        updateLastNum(null);
        setStatus('Partida reseteada');
        break;
    }
  };
  ws.onclose = () => {
    document.getElementById('conn-indicator').classList.remove('ok');
    setStatus('Desconectado — reconectando...');
    setTimeout(connect, 2000);
  };
}
connect();

function setStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
}

function updateLastNum(n) {
  document.getElementById('last-value').textContent = n ? n : '—';
}

// ── LOAD CARDS ─────────────────────────────────────────────────────
function loadCards(cards) {
  cardsData = cards;
  document.getElementById('waiting').style.display = 'none';
  const grid = document.getElementById('cards-grid');
  grid.style.display = 'grid';
  grid.innerHTML = '';

  cards.forEach((card, ci) => {
    const cardEl = document.createElement('div');
    cardEl.className = 'bingo-card';
    cardEl.id = `card-${ci}`;
    cardEl.style.background = 'linear-gradient(160deg,#ffffff,#f0f4ff)';
    cardEl.style.borderColor = '#aabbdd';

    // Name wrap
    const nw = document.createElement('div');
    nw.className = 'card-name-wrap';
    const badge = document.createElement('div');
    badge.className = 'card-num-badge';
    badge.textContent = (LOCAL_ID - 1) * 15 + ci + 1;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = `Jugador ${(LOCAL_ID-1)*15+ci+1}`;
    inp.id = `name-${ci}`;
    inp.maxLength = 20;
    nw.appendChild(badge); nw.appendChild(inp);
    cardEl.appendChild(nw);

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'card-header';
    ['B','I','N','G','O'].forEach(l => {
      const s = document.createElement('span');
      s.className = `ltr-${l}`; s.textContent = l;
      hdr.appendChild(s);
    });
    cardEl.appendChild(hdr);

    // Grid 5x5
    const cg = document.createElement('div');
    cg.className = 'card-grid';
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.id = `cell-${ci}-${r}-${c}`;
        const isFree = (r===2 && c===2);
        if (isFree) { cell.classList.add('free','marked'); cell.textContent='FREE'; }
        else { cell.textContent = card[r][c]; cell.dataset.num = card[r][c]; }
        cg.appendChild(cell);
      }
    }
    cardEl.appendChild(cg);
    grid.appendChild(cardEl);
  });

  setStatus(`${cards.length} cartones listos — ¡Buena suerte! 🍀`);
}

// ── MARK NUMBER ON CARDS ────────────────────────────────────────────
function markNumberOnCards(n, animate) {
  cardsData.forEach((card, ci) => {
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const cell = document.getElementById(`cell-${ci}-${r}-${c}`);
        if (cell && parseInt(cell.dataset.num) === n) {
          cell.classList.add('marked');
          if (animate) flashCell(cell);
        }
      }
    }
    checkWin(ci);
  });
}

function flashCell(el) {
  if (!el) return;
  el.style.position = 'relative'; el.style.zIndex = '10';
  const frames = [
    {transform:'scale(1.35)',boxShadow:'0 0 0 4px #ffd700,0 0 20px #ffd700',filter:'brightness(2)',offset:0},
    {transform:'scale(1.2)', boxShadow:'0 0 0 3px #ff8800,0 0 14px #ff8800', filter:'brightness(1.5)',offset:.2},
    {transform:'scale(1.1)', boxShadow:'0 0 0 2px #ff4400,0 0 10px #ff4400', filter:'brightness(1.2)',offset:.45},
    {transform:'scale(.96)', boxShadow:'0 0 8px rgba(255,60,0,.8)',filter:'brightness(1)',offset:.7},
    {transform:'scale(.94)', boxShadow:'0 0 10px rgba(255,60,0,.7)',filter:'brightness(1)',offset:1},
  ];
  const anim = el.animate(frames, {duration:1500,easing:'ease-out',fill:'forwards'});
  anim.onfinish = () => { el.style.zIndex=''; el.style.position=''; };
  // Ring
  const ring = document.createElement('div');
  ring.style.cssText='position:absolute;inset:-5px;border-radius:8px;pointer-events:none;border:3px solid #ffd700;z-index:20;';
  el.appendChild(ring);
  ring.animate([
    {opacity:1,transform:'scale(1)',borderColor:'#ffd700'},
    {opacity:.7,transform:'scale(1.6)',borderColor:'#ff8800'},
    {opacity:0,transform:'scale(2.2)',borderColor:'#ff4400'},
  ],{duration:800,easing:'ease-out',fill:'forwards'}).onfinish=()=>ring.remove();
}

// ── WIN DETECTION ───────────────────────────────────────────────────
function isMarked(ci, r, c) {
  if (r===2&&c===2) return true;
  const el = document.getElementById(`cell-${ci}-${r}-${c}`);
  return el && el.classList.contains('marked');
}

function hasLine(ci) {
  for(let r=0;r<5;r++) if([0,1,2,3,4].every(c=>isMarked(ci,r,c))) return {type:'row',idx:r};
  for(let c=0;c<5;c++) if([0,1,2,3,4].every(r=>isMarked(ci,r,c))) return {type:'col',idx:c};
  if([0,1,2,3,4].every(i=>isMarked(ci,i,i))) return {type:'diag',idx:0};
  if([0,1,2,3,4].every(i=>isMarked(ci,i,4-i))) return {type:'diag',idx:1};
  return null;
}

function hasFullCard(ci) {
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) if(!isMarked(ci,r,c)) return false;
  return true;
}

function hasPattern(ci, name) {
  return PATTERNS[name].every(([r,c])=>isMarked(ci,r,c));
}

function highlightLine(ci, line) {
  const key=`${ci}-${line.type}-${line.idx}`;
  if(highlightedLines.has(key)) return; highlightedLines.add(key);
  const cells=[];
  if(line.type==='row') for(let c=0;c<5;c++) cells.push([line.idx,c]);
  else if(line.type==='col') for(let r=0;r<5;r++) cells.push([r,line.idx]);
  else for(let i=0;i<5;i++) cells.push([i,line.idx===0?i:4-i]);
  cells.forEach(([r,c])=>{
    const el=document.getElementById(`cell-${ci}-${r}-${c}`);
    if(el){el.style.cssText='';el.classList.add('win-line');}
  });
}

function checkWin(ci) {
  const allDone = Object.values(prizes).every(v=>v);
  if (allDone) return;

  // Full card
  if (prizes.line && !prizes.fullCard && hasFullCard(ci)) {
    prizes.fullCard = true;
    for(let r=0;r<5;r++) for(let c=0;c<5;c++){
      const el=document.getElementById(`cell-${ci}-${r}-${c}`);
      if(el){el.style.cssText='';el.classList.add('win-full');}
    }
    const name = document.getElementById(`name-${ci}`)?.value.trim() || `Cartón ${ci+1}`;
    ws.send(JSON.stringify({type:'prize_won',prize:'fullCard',localId:LOCAL_ID,cardIdx:ci,playerName:name}));
    return;
  }

  // Line bingo
  if (!prizes.line) {
    const line = hasLine(ci);
    if (line) {
      prizes.line = true;
      highlightLine(ci, line);
      const name = document.getElementById(`name-${ci}`)?.value.trim() || `Cartón ${ci+1}`;
      ws.send(JSON.stringify({type:'prize_won',prize:'line',localId:LOCAL_ID,cardIdx:ci,playerName:name}));
      return;
    }
  }

  // Shape prizes
  for (const shape of ['L','T','X','CRUZ']) {
    if (!prizes[shape] && hasPattern(ci, shape)) {
      prizes[shape] = true;
      PATTERNS[shape].forEach(([r,c])=>{
        const el=document.getElementById(`cell-${ci}-${r}-${c}`);
        if(el){el.style.cssText='';el.classList.remove('win-line','win-full');}
      });
      const COLORS={L:'#ff9900',T:'#dd44ff',X:'#ff4466',CRUZ:'#44ffff'};
      PATTERNS[shape].forEach(([r,c])=>{
        const el=document.getElementById(`cell-${ci}-${r}-${c}`);
        if(el) el.style.cssText=`background:radial-gradient(circle,${COLORS[shape]},#000088)!important;border-color:${COLORS[shape]}!important;box-shadow:0 0 14px ${COLORS[shape]}99!important;color:#000!important;font-weight:900!important;animation:patGlow .9s ease-in-out infinite alternate`;
      });
      const name = document.getElementById(`name-${ci}`)?.value.trim() || `Cartón ${ci+1}`;
      ws.send(JSON.stringify({type:'prize_won',prize:shape,localId:LOCAL_ID,cardIdx:ci,playerName:name}));
      return;
    }
  }
}

// ── WINNER POPUP ────────────────────────────────────────────────────
function showWinner(msg) {
  const info = PRIZES_INFO[msg.prize] || PRIZES_INFO.line;
  const isOurCard = msg.localId === LOCAL_ID;
  document.getElementById('w-icon').textContent = info.icon;
  document.getElementById('w-title').textContent = isOurCard ? `¡${info.msg}` : info.msg;
  document.getElementById('w-name').textContent = msg.playerName || `Cartón ${msg.cardIdx+1}`;
  document.getElementById('w-prize').textContent = info.prize;
  document.getElementById('w-sub').textContent = isOurCard
    ? (msg.prize==='fullCard' ? '¡ERES EL GRAN GANADOR! 🎉' : 'Continúa en 10s...')
    : (msg.prize==='fullCard' ? `¡Ganó el Local ${msg.localId}!` : `Local ${msg.localId} · Continúa en 10s...`);
  if (isOurCard) document.getElementById('winner-box').style.borderColor = info.color;
  document.getElementById('winner-ov').classList.add('show');
  if (isOurCard) launchFW();
  if (msg.prize !== 'fullCard') setTimeout(closeWinner, 10000);
}

function closeWinner() {
  document.getElementById('winner-ov').classList.remove('show');
  stopFW();
}

let fwAF,fwP=[],fwCtx;
function launchFW(){
  const fc=document.getElementById('fwc');fc.width=window.innerWidth;fc.height=window.innerHeight;
  fwCtx=fc.getContext('2d');fwP=[];
  const cols=['#ffd700','#ff4488','#44ddff','#88ff44','#ff8800','#cc44ff'];
  for(let i=0;i<160;i++) fwP.push({x:Math.random()*fc.width,y:Math.random()*fc.height*.7,
    vx:(Math.random()-.5)*9,vy:(Math.random()-.5)*9-4,r:Math.random()*5+2,
    c:cols[Math.floor(Math.random()*cols.length)],life:1,dec:Math.random()*.01+.006});
  fwAF=requestAnimationFrame(dFW);
}
function dFW(){
  fwCtx.clearRect(0,0,fwCtx.canvas.width,fwCtx.canvas.height);
  fwP.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.life-=p.dec;
    fwCtx.globalAlpha=Math.max(0,p.life);fwCtx.beginPath();
    fwCtx.arc(p.x,p.y,p.r,0,2*Math.PI);fwCtx.fillStyle=p.c;fwCtx.fill();});
  fwCtx.globalAlpha=1;fwP=fwP.filter(p=>p.life>0);
  if(fwP.length) fwAF=requestAnimationFrame(dFW);
}
function stopFW(){cancelAnimationFrame(fwAF);if(fwCtx)fwCtx.clearRect(0,0,fwCtx.canvas.width,fwCtx.canvas.height);}
